<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Uptime Monitor · Akın Üner</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0c12;--surface:#111420;--border:rgba(255,255,255,.07);--ink:#fff;--muted:rgba(255,255,255,.35);--green:#00ff88;--red:#ff3355;--yellow:#ffd600;--cyan:#00e5ff;}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:'Courier New',monospace;}
#app{max-width:960px;margin:0 auto;padding:0 5vw 80px;}
header{padding:36px 0 32px;border-bottom:1px solid var(--border);margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.logo{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;letter-spacing:-.02em;line-height:1;}
.logo span{color:var(--cyan);}
.logo-sub{font-size:.48rem;letter-spacing:.5em;color:var(--muted);text-transform:uppercase;margin-top:6px;}
.header-right{display:flex;align-items:center;gap:12px;}
.status-dot{width:14px;height:14px;border-radius:50%;background:var(--muted);transition:all .4s;flex-shrink:0;}
.status-dot.up{background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 2s ease-in-out infinite;}
.status-dot.down{background:var(--red);box-shadow:0 0 12px var(--red);animation:blink 1s ease-in-out infinite;}
.status-dot.mixed{background:var(--yellow);box-shadow:0 0 12px var(--yellow);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.global-label{font-size:.42rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;}
.global-val{font-size:.85rem;font-weight:700;color:var(--ink);margin-top:2px;}
.add-card{background:var(--surface);border:1px solid var(--border);padding:24px 28px;margin-bottom:16px;}
.add-title{font-size:.44rem;letter-spacing:.5em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.add-row{display:flex;gap:8px;flex-wrap:wrap;}
.inp{background:var(--bg);border:1px solid var(--border);color:var(--ink);font-family:'Courier New',monospace;font-size:.68rem;padding:10px 14px;outline:none;transition:border-color .3s;flex:1;min-width:140px;}
.inp:focus{border-color:var(--cyan);}
.inp::placeholder{color:var(--muted);}
.sel{appearance:none;cursor:pointer;flex:0;min-width:110px;}
.add-btn{padding:10px 24px;background:var(--cyan);border:none;color:#000;font-family:'Courier New',monospace;font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .3s;white-space:nowrap;}
.add-btn:hover{background:var(--green);}
.stats-bar{display:flex;gap:2px;margin-bottom:16px;}
.stat-item{flex:1;background:var(--surface);border:1px solid var(--border);padding:16px;text-align:center;}
.stat-n{font-size:1.6rem;font-weight:700;letter-spacing:-.02em;color:var(--ink);}
.stat-n.g{color:var(--green);}.stat-n.r{color:var(--red);}
.stat-l{font-size:.42rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.empty-state{text-align:center;padding:80px 20px;border:1px solid var(--border);background:var(--surface);}
.es-icon{font-size:3rem;opacity:.2;margin-bottom:16px;}
.es-text{font-size:.6rem;letter-spacing:.15em;color:var(--muted);line-height:2;text-transform:uppercase;}
.site-card{background:var(--surface);border:1px solid var(--border);margin-bottom:2px;overflow:hidden;transition:border-color .3s;}
.site-card.up{border-color:rgba(0,255,136,.15);}
.site-card.down{border-color:rgba(255,51,85,.25);}
.site-header{display:flex;align-items:center;gap:16px;padding:18px 22px;cursor:pointer;}
.site-indicator{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .4s;}
.site-indicator.up{background:var(--green);box-shadow:0 0 8px var(--green);}
.site-indicator.down{background:var(--red);box-shadow:0 0 8px var(--red);animation:blink 1s ease-in-out infinite;}
.site-indicator.checking{background:var(--yellow);}
.site-info{flex:1;min-width:0;}
.site-name{font-size:.78rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.site-url{font-size:.52rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.site-badge{padding:4px 12px;font-size:.44rem;letter-spacing:.3em;text-transform:uppercase;border:1px solid;flex-shrink:0;}
.site-badge.up{color:var(--green);border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.06);}
.site-badge.down{color:var(--red);border-color:rgba(255,51,85,.3);background:rgba(255,51,85,.06);}
.site-badge.checking{color:var(--yellow);border-color:rgba(255,214,0,.3);background:rgba(255,214,0,.06);}
.site-response{font-size:.62rem;color:var(--muted);flex-shrink:0;min-width:70px;text-align:right;}
.site-remove{background:transparent;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:.9rem;padding:4px 6px;transition:color .3s;flex-shrink:0;}
.site-remove:hover{color:var(--red);}
.site-history{padding:0 22px 18px;display:none;}
.site-card.expanded .site-history{display:block;}
.history-label{font-size:.4rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.history-bars{display:flex;gap:2px;align-items:flex-end;height:48px;}
.hbar{flex:1;border-radius:1px;min-height:4px;}
.hbar.up{background:var(--green);opacity:.7;}
.hbar.down{background:var(--red);opacity:.9;}
.hbar.pending{background:var(--muted);opacity:.3;}
.history-meta{display:flex;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:8px;}
.hm-item{font-size:.42rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.hm-item span{color:var(--ink);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);padding:10px 24px;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:.52rem;letter-spacing:.15em;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="logo">UPTIME<span>WATCH</span></div>
      <div class="logo-sub">Website Monitor · Akın Üner</div>
    </div>
    <div class="header-right">
      <div class="status-dot" id="globalDot"></div>
      <div><div class="global-label">All Systems</div><div class="global-val" id="globalStatus">—</div></div>
    </div>
  </header>
  <div class="add-card">
    <div class="add-title">Add Website</div>
    <div class="add-row">
      <input class="inp" id="siteUrl"  type="url"  placeholder="https://github.com"/>
      <input class="inp" id="siteName" type="text" placeholder="Name (optional)"/>
      <select class="inp sel" id="siteInterval">
        <option value="30">Every 30s</option>
        <option value="60" selected>Every 1min</option>
        <option value="300">Every 5min</option>
      </select>
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat-item"><div class="stat-n" id="stTotal">0</div><div class="stat-l">Sites</div></div>
    <div class="stat-item"><div class="stat-n g" id="stUp">0</div><div class="stat-l">Online</div></div>
    <div class="stat-item"><div class="stat-n r" id="stDown">0</div><div class="stat-l">Offline</div></div>
    <div class="stat-item"><div class="stat-n" id="stAvg">—</div><div class="stat-l">Avg Response</div></div>
  </div>
  <div id="siteList">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">🌐</div>
      <div class="es-text">No sites added yet.<br/>Add a website above to start monitoring.</div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
// ── State — her site ayrı timer'a sahip ──
var sites  = {};   // id → site objesi (array yerine object — ID'ye hızlı erişim)
var timers = {};   // id → setInterval handle
var toastTm;

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTm);
  toastTm = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function getSiteList() {
  // Object.values polyfill
  return Object.keys(sites).map(function(k){ return sites[k]; });
}

function save() {
  try { localStorage.setItem('uptimeData', JSON.stringify(getSiteList())); } catch(e){}
}

function load() {
  try {
    var d = localStorage.getItem('uptimeData');
    if (d) {
      var arr = JSON.parse(d);
      arr.forEach(function(s){ sites[s.id] = s; });
    }
  } catch(e){ sites = {}; }
}

function urlToName(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e){ return url; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badge(s) {
  return s==='up'?'ONLINE':s==='down'?'OFFLINE':'CHECKING';
}

// ── Add site ──
function addSite() {
  var url  = document.getElementById('siteUrl').value.trim();
  var name = document.getElementById('siteName').value.trim();
  var intv = parseInt(document.getElementById('siteInterval').value);

  if (!url) { showToast('Please enter a URL'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  // Duplicate check
  var list = getSiteList();
  for (var i=0; i<list.length; i++) {
    if (list[i].url === url) { showToast('Already added!'); return; }
  }

  var id   = Date.now();
  var site = {
    id: id, url: url,
    name: name || urlToName(url),
    interval: intv,
    status: 'checking',
    response: null,
    history: new Array(30).fill('pending'),
    uptime: 0, checks: 0, ups: 0, lastCheck: null
  };

  sites[id] = site;
  save();

  document.getElementById('siteUrl').value  = '';
  document.getElementById('siteName').value = '';

  // Add card to DOM directly — no full re-render
  addCardToDOM(site);
  updateStatsBar();
  updateGlobal();

  // Start monitoring this site
  startMonitor(site);
  showToast('✓ ' + site.name + ' added!');
}

// ── Remove ──
function removeSite(id) {
  clearInterval(timers[id]);
  delete timers[id];
  delete sites[id];
  save();
  var card = document.getElementById('card-'+id);
  if (card) card.remove();
  var list = getSiteList();
  if (list.length === 0) {
    document.getElementById('statsBar').style.display = 'none';
    var empty = document.getElementById('emptyState');
    empty.style.display = 'block';
    document.getElementById('siteList').appendChild(empty);
  }
  updateStatsBar();
  updateGlobal();
}

function toggleCard(id) {
  var card = document.getElementById('card-'+id);
  if (card) card.classList.toggle('expanded');
}

// ── Check site ──
function checkSite(site) {
  // Mark as checking
  site.status = 'checking';
  updateCardDOM(site);

  var start = Date.now();

  fetch(site.url, { method:'HEAD', mode:'no-cors', cache:'no-cache' })
  .then(function() {
    site.status   = 'up';
    site.response = Date.now() - start;
    site.checks++;
    site.ups++;
    site.uptime    = Math.round(site.ups / site.checks * 100);
    site.lastCheck = new Date().toLocaleTimeString();
    site.history.push('up');
    if (site.history.length > 30) site.history.shift();
    save();
    updateCardDOM(site);
    updateStatsBar();
    updateGlobal();
  })
  .catch(function() {
    site.status   = 'down';
    site.response = null;
    site.checks++;
    site.uptime    = Math.round(site.ups / site.checks * 100);
    site.lastCheck = new Date().toLocaleTimeString();
    site.history.push('down');
    if (site.history.length > 30) site.history.shift();
    save();
    updateCardDOM(site);
    updateStatsBar();
    updateGlobal();
  });
}

// ── Start monitor ──
function startMonitor(site) {
  // Clear any existing timer for this site
  if (timers[site.id]) clearInterval(timers[site.id]);
  // Check immediately
  checkSite(site);
  // Then repeat
  timers[site.id] = setInterval(function() {
    checkSite(site);
  }, site.interval * 1000);
}

// ── Build history bars ──
function buildBars(history) {
  return history.map(function(h) {
    var ht = h==='up' ? (60+Math.random()*38) : h==='down' ? 20 : 10;
    return '<div class="hbar '+h+'" style="height:'+ht+'%"></div>';
  }).join('');
}

// ── Add card to DOM ──
function addCardToDOM(site) {
  var empty    = document.getElementById('emptyState');
  var statsBar = document.getElementById('statsBar');
  var list     = document.getElementById('siteList');

  empty.style.display    = 'none';
  statsBar.style.display = 'flex';

  var card = document.createElement('div');
  card.className = 'site-card checking';
  card.id = 'card-' + site.id;
  card.innerHTML =
    '<div class="site-header" onclick="toggleCard('+site.id+')">' +
      '<div class="site-indicator checking" id="ind-'+site.id+'"></div>' +
      '<div class="site-info">' +
        '<div class="site-name">'+esc(site.name)+'</div>' +
        '<div class="site-url">'+esc(site.url)+'</div>' +
      '</div>' +
      '<div class="site-response" id="resp-'+site.id+'">—</div>' +
      '<div class="site-badge checking" id="badge-'+site.id+'">CHECKING</div>' +
      '<button class="site-remove" onclick="event.stopPropagation();removeSite('+site.id+')">✕</button>' +
    '</div>' +
    '<div class="site-history">' +
      '<div class="history-label">Last 30 Checks</div>' +
      '<div class="history-bars" id="hist-'+site.id+'">'+buildBars(site.history)+'</div>' +
      '<div class="history-meta">' +
        '<div class="hm-item">Uptime: <span id="upt-'+site.id+'">0%</span></div>' +
        '<div class="hm-item">Checks: <span id="chk-'+site.id+'">0</span></div>' +
        '<div class="hm-item">Last: <span id="lst-'+site.id+'">—</span></div>' +
      '</div>' +
    '</div>';

  list.appendChild(card);
}

// ── Update existing card DOM ──
function updateCardDOM(site) {
  var card = document.getElementById('card-'+site.id);
  if (!card) return;

  var exp = card.classList.contains('expanded');
  card.className = 'site-card ' + site.status + (exp?' expanded':'');

  var g = function(id){ return document.getElementById(id); };
  var ind  = g('ind-'  + site.id); if(ind)  ind.className = 'site-indicator '+site.status;
  var bdg  = g('badge-'+ site.id); if(bdg)  { bdg.className='site-badge '+site.status; bdg.textContent=badge(site.status); }
  var rsp  = g('resp-' + site.id); if(rsp)  rsp.textContent = site.response ? site.response+'ms' : '—';
  var hst  = g('hist-' + site.id); if(hst)  hst.innerHTML  = buildBars(site.history);
  var upt  = g('upt-'  + site.id); if(upt)  upt.textContent = site.uptime+'%';
  var chk  = g('chk-'  + site.id); if(chk)  chk.textContent = site.checks;
  var lst  = g('lst-'  + site.id); if(lst)  lst.textContent = site.lastCheck || '—';
}

// ── Stats bar ──
function updateStatsBar() {
  var list = getSiteList();
  var up   = list.filter(function(s){ return s.status==='up'; }).length;
  var down = list.filter(function(s){ return s.status==='down'; }).length;
  var resp = list.filter(function(s){ return s.response; }).map(function(s){ return s.response; });
  var avg  = resp.length ? Math.round(resp.reduce(function(a,b){return a+b;},0)/resp.length) : null;
  document.getElementById('stTotal').textContent = list.length;
  document.getElementById('stUp').textContent    = up;
  document.getElementById('stDown').textContent  = down;
  document.getElementById('stAvg').textContent   = avg ? avg+'ms' : '—';
}

// ── Global dot ──
function updateGlobal() {
  var dot   = document.getElementById('globalDot');
  var label = document.getElementById('globalStatus');
  var list  = getSiteList();
  var up    = list.filter(function(s){ return s.status==='up'; }).length;
  var down  = list.filter(function(s){ return s.status==='down'; }).length;
  if (list.length===0)       { dot.className='status-dot'; label.textContent='—'; }
  else if (down===0&&up>0)   { dot.className='status-dot up';    label.textContent='All Online'; }
  else if (up===0&&down>0)   { dot.className='status-dot down';  label.textContent='All Offline'; }
  else                        { dot.className='status-dot mixed'; label.textContent=up+'/'+list.length+' Online'; }
}

// ── Init ──
document.getElementById('addBtn').addEventListener('click', addSite);
document.getElementById('siteUrl').addEventListener('keydown', function(e){
  if (e.key === 'Enter') addSite();
});

// Load saved sites and start their monitors
load();
var saved = getSiteList();
if (saved.length > 0) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('statsBar').style.display   = 'flex';
  saved.forEach(function(site) {
    addCardToDOM(site);
    startMonitor(site);
  });
  updateStatsBar();
  updateGlobal();
}
</script>
</body>
</html>
